<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goethe A1 German Vocabulary — Complete Study Guide</title>
<style>
  :root {
    --gold: #f5c842;
    --dark: #1a1a2e;
    --card: #16213e;
    --accent: #0f3460;
    --green: #4ade80;
    --red: #f87171;
    --blue: #60a5fa;
    --purple: #c084fc;
    --text: #e2e8f0;
    --muted: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #0f3460, #1a1a2e);
    padding: 2rem;
    text-align: center;
    border-bottom: 3px solid var(--gold);
  }
  header h1 { font-size: 2rem; color: var(--gold); margin-bottom: 0.4rem; }
  header p { color: var(--muted); font-size: 0.95rem; }

  .stats-bar {
    display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap;
    padding: 1rem 2rem; background: var(--accent);
  }
  .stat { text-align: center; }
  .stat .num { font-size: 1.6rem; font-weight: 700; color: var(--gold); }
  .stat .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .controls {
    display: flex; flex-wrap: wrap; gap: 0.75rem; padding: 1.25rem 2rem;
    align-items: center; background: #111827; border-bottom: 1px solid #2d3748;
    position: sticky; top: 0; z-index: 100;
  }
  input[type="text"] {
    flex: 1; min-width: 200px; padding: 0.55rem 1rem;
    background: var(--card); border: 1px solid #374151; border-radius: 8px;
    color: var(--text); font-size: 0.95rem;
  }
  select {
    padding: 0.55rem 1rem; background: var(--card); border: 1px solid #374151;
    border-radius: 8px; color: var(--text); font-size: 0.9rem; cursor: pointer;
  }
  .btn {
    padding: 0.55rem 1.2rem; border-radius: 8px; border: none; cursor: pointer;
    font-weight: 600; font-size: 0.88rem; transition: all 0.2s;
  }
  .btn-gold { background: var(--gold); color: #1a1a2e; }
  .btn-gold:hover { background: #fbbf24; }
  .btn-outline { background: transparent; border: 1px solid var(--muted); color: var(--muted); }
  .btn-outline:hover { border-color: var(--text); color: var(--text); }
  .btn-green { background: #166534; color: var(--green); }
  .btn-red { background: #7f1d1d; color: var(--red); }

  #count-display { color: var(--muted); font-size: 0.85rem; white-space: nowrap; }

  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1.25rem; padding: 1.5rem 2rem;
  }

  .card {
    background: var(--card); border-radius: 14px; padding: 1.25rem;
    border: 1px solid #2d3748; transition: transform 0.2s, border-color 0.2s;
    cursor: pointer; position: relative;
  }
  .card:hover { transform: translateY(-3px); border-color: var(--gold); }
  .card.learned { border-color: var(--green); background: #0d2818; }
  .card.learning { border-color: #fbbf24; background: #1c1508; }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.6rem; }
  .german { font-size: 1.25rem; font-weight: 700; color: white; }
  .article { font-size: 0.8rem; color: var(--purple); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .category-badge {
    font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 999px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
  }

  .english { font-size: 1rem; color: var(--blue); margin-bottom: 0.5rem; }
  .pronunciation {
    font-size: 0.82rem; color: var(--gold); background: rgba(245,200,66,0.1);
    padding: 0.25rem 0.6rem; border-radius: 6px; display: inline-block; margin-bottom: 0.6rem;
    font-family: monospace;
  }
  .example { font-size: 0.85rem; color: var(--muted); font-style: italic; border-left: 2px solid #374151; padding-left: 0.6rem; margin-bottom: 0.5rem; }
  .example span { color: #94a3b8; display: block; font-style: normal; margin-top: 2px; font-size: 0.82rem; }
  .memory-hack {
    font-size: 0.82rem; background: rgba(192,132,252,0.1); border: 1px solid rgba(192,132,252,0.3);
    border-radius: 8px; padding: 0.45rem 0.7rem; color: #d8b4fe; margin-top: 0.4rem;
  }
  .memory-hack::before { content: "🧠 "; }

  .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 0.75rem; }
  .mark-btn { font-size: 0.75rem; padding: 0.3rem 0.7rem; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
  .mark-learned { background: #166534; color: var(--green); }
  .mark-learned:hover { background: #14532d; }
  .mark-review { background: #78350f; color: #fbbf24; }
  .mark-review:hover { background: #92400e; }

  .section-header {
    padding: 0.6rem 2rem; font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 2px; color: var(--gold); background: rgba(245,200,66,0.06);
    border-bottom: 1px solid #2d3748; border-top: 1px solid #2d3748;
    display: flex; align-items: center; gap: 0.5rem;
  }

  .quiz-panel {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    z-index: 200; align-items: center; justify-content: center;
  }
  .quiz-panel.active { display: flex; }
  .quiz-box {
    background: var(--card); border-radius: 18px; padding: 2.5rem;
    max-width: 500px; width: 90%; text-align: center; border: 2px solid var(--gold);
  }
  .quiz-q { font-size: 1.8rem; font-weight: 700; color: white; margin-bottom: 0.5rem; }
  .quiz-hint { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.5rem; }
  .quiz-opt {
    padding: 0.75rem; border-radius: 10px; border: 2px solid #374151;
    background: #0f172a; color: var(--text); cursor: pointer; font-size: 0.95rem;
    transition: all 0.15s;
  }
  .quiz-opt:hover { border-color: var(--gold); }
  .quiz-opt.correct { border-color: var(--green); background: #14532d; color: var(--green); }
  .quiz-opt.wrong { border-color: var(--red); background: #7f1d1d; color: var(--red); }
  .quiz-score { font-size: 1rem; color: var(--muted); margin-bottom: 1rem; }

  .progress-bar { height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; margin: 0.5rem 0 1rem; }
  .progress-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.3s; }

  footer { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.8rem; border-top: 1px solid #1e293b; }
</style>
</head>
<body>

<header>
  <h1>🇩🇪 Goethe-Zertifikat A1 — Complete Vocabulary</h1>
  <p>~650 words · English translations · Pronunciation guides · Memory hacks</p>
</header>

<div class="stats-bar">
  <div class="stat"><div class="num" id="total-count">0</div><div class="label">Total Words</div></div>
  <div class="stat"><div class="num" id="learned-count" style="color:var(--green)">0</div><div class="label">Learned ✓</div></div>
  <div class="stat"><div class="num" id="review-count" style="color:#fbbf24">0</div><div class="label">Reviewing</div></div>
  <div class="stat"><div class="num" id="progress-pct">0%</div><div class="label">Progress</div></div>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="🔍 Search German or English...">
  <select id="filter-cat">
    <option value="all">All Categories</option>
    <option value="nouns">Nouns</option>
    <option value="verbs">Verbs</option>
    <option value="adjectives">Adjectives</option>
    <option value="phrases">Phrases</option>
    <option value="other">Other</option>
  </select>
  <select id="filter-status">
    <option value="all">All Status</option>
    <option value="unstarted">Not Started</option>
    <option value="learning">Reviewing</option>
    <option value="learned">Learned</option>
  </select>
  <button class="btn btn-gold" onclick="startQuiz()">🎯 Quiz Me!</button>
  <button class="btn btn-outline" onclick="resetAll()">Reset Progress</button>
  <span id="count-display"></span>
</div>

<div id="vocab-container"></div>

<!-- Quiz Panel -->
<div class="quiz-panel" id="quiz-panel">
  <div class="quiz-box">
    <div class="quiz-score" id="quiz-score">Question 1 / 10</div>
    <div class="progress-bar"><div class="progress-fill" id="quiz-progress" style="width:0%"></div></div>
    <div class="quiz-q" id="quiz-q"></div>
    <div class="quiz-hint" id="quiz-hint"></div>
    <div class="quiz-options" id="quiz-opts"></div>
    <button class="btn btn-outline" onclick="closeQuiz()" style="margin-top:0.5rem">✕ Close Quiz</button>
  </div>
</div>

<footer>Goethe-Institut A1 Start Deutsch 1 · Wortliste · All ~650 vocabulary items</footer>

<script>
const VOCAB = [
  // ── A ──
  {g:"ab", e:"from / starting from", cat:"other", pron:"APP", ex:"Ab morgen muss ich arbeiten.", ex_e:"Starting tomorrow I have to work.", hack:"Think 'ab' = 'off from' — like a rocket lifting off from a launch point."},
  {g:"aber", e:"but / however", cat:"other", pron:"AH-ber", ex:"Ich bin oft im Büro, aber nur kurz.", ex_e:"I'm often in the office, but only briefly.", hack:"'Aber' sounds like 'uh-ber' — imagine saying 'But, uber-nope!'"},
  {g:"abfahren", e:"to depart / leave (vehicle)", cat:"verbs", pron:"APP-far-en", ex:"Wir fahren um zwölf Uhr ab.", ex_e:"We depart at twelve o'clock.", hack:"'Ab' = off, 'fahren' = drive. Drive off!"},
  {g:"die Abfahrt", e:"departure", cat:"nouns", art:"die", pron:"APP-fart", ex:"Vor der Abfahrt rufe ich an.", ex_e:"Before departure I'll call.", hack:"Ab-FAHRT — the 'fahrt' is just 'journey/drive'. The train FAHRT-s away."},
  {g:"abgeben", e:"to hand in / give back", cat:"verbs", pron:"APP-gay-ben", ex:"Ich muss meine Schlüssel abgeben.", ex_e:"I have to hand in my keys.", hack:"'Geben' = give, 'ab' = away. Give away/hand over."},
  {g:"abholen", e:"to pick up / collect", cat:"verbs", pron:"APP-ho-len", ex:"Wann kann ich den Schrank abholen?", ex_e:"When can I pick up the wardrobe?", hack:"'Holen' = to fetch. Ab-fetch = fetch and bring back."},
  {g:"der Absender", e:"sender (of a letter)", cat:"nouns", art:"der", pron:"APP-zen-der", ex:"Ein Brief ohne Absender.", ex_e:"A letter without a sender.", hack:"Ab-SENDER — the person who 'sends it off'."},
  {g:"Achtung", e:"Attention! / Watch out!", cat:"phrases", pron:"AHKH-toong", ex:"Achtung! Das dürfen Sie nicht tun.", ex_e:"Attention! You must not do that.", hack:"Sounds like 'action!' — shout it before something important happens."},
  {g:"die Adresse", e:"address", cat:"nouns", art:"die", pron:"ah-DRES-seh", ex:"Können Sie mir seine Adresse sagen?", ex_e:"Can you tell me his address?", hack:"Almost identical to English 'address' — just add an 'e' at the end."},
  {g:"all-", e:"all / every / everything", cat:"other", pron:"ALL", ex:"Alles Gute! Das ist alles.", ex_e:"All the best! That is everything.", hack:"'Alles' = 'all-es'. Even in English we say 'all-es-good'."},
  {g:"allein", e:"alone", cat:"adjectives", pron:"ah-LINE", ex:"Er kommt allein.", ex_e:"He comes alone.", hack:"'All-ein' = 'all-one'. When you're alone, you're ALL ONE person there."},
  {g:"also", e:"so / therefore / well then", cat:"other", pron:"AHL-zo", ex:"Also, es ist so...", ex_e:"So, it is like this...", hack:"Germans say 'also' to mean 'so/therefore' — like 'alsooo, let me explain'."},
  {g:"alt", e:"old", cat:"adjectives", pron:"AHLT", ex:"Wie alt sind Sie?", ex_e:"How old are you?", hack:"'Alt' sounds like 'old' said with a German accent. Alt = old!"},
  {g:"das Alter", e:"age", cat:"nouns", art:"das", pron:"AHL-ter", ex:"Alter: 26 Jahre.", ex_e:"Age: 26 years.", hack:"Same root as 'alt' (old). Your 'alter' = how old you are."},
  {g:"an", e:"at / on / to (direction)", cat:"other", pron:"AHN", ex:"Wir treffen uns am Bahnhof.", ex_e:"We meet at the station.", hack:"'An' is like the English prefix 'an-' meaning toward/onto something."},
  {g:"anbieten", e:"to offer", cat:"verbs", pron:"AHN-bee-ten", ex:"Was darf ich dir anbieten?", ex_e:"What may I offer you?", hack:"'Bieten' = to offer/bid. 'An-bieten' = offer up to someone."},
  {g:"das Angebot", e:"offer / special deal", cat:"nouns", art:"das", pron:"AHN-ge-boht", ex:"Heute sind Schuhe im Angebot.", ex_e:"Today shoes are on special offer.", hack:"An-ge-BOT — like a 'bet/bid' made to you. A deal offered up."},
  {g:"ander-", e:"other / different", cat:"other", pron:"AHN-der", ex:"Ich möchte die andere Jacke.", ex_e:"I'd like the other jacket.", hack:"'Ander' sounds like 'under' but means 'other'. The OTHER one under your nose!"},
  {g:"anfangen", e:"to begin / start", cat:"verbs", pron:"AHN-fang-en", ex:"Der Unterricht fängt gleich an.", ex_e:"The class starts right away.", hack:"'Fangen' = to catch/grab. You 'grab the start' — begin!"},
  {g:"der Anfang", e:"beginning / start", cat:"nouns", art:"der", pron:"AHN-fang", ex:"Am Anfang der Straße.", ex_e:"At the beginning of the street.", hack:"An-FANG — you 'fang' (catch) the beginning."},
  {g:"anklicken", e:"to click (computer)", cat:"verbs", pron:"AHN-click-en", ex:"Du musst dieses Wort anklicken.", ex_e:"You have to click this word.", hack:"'Klicken' = click. Same as English, just with 'an-' (onto) in front."},
  {g:"ankommen", e:"to arrive", cat:"verbs", pron:"AHN-kom-en", ex:"Wann kommt dieser Zug in Hamburg an?", ex_e:"When does this train arrive in Hamburg?", hack:"An-KOMMEN = 'come onto' = arrive at the destination."},
  {g:"die Ankunft", e:"arrival", cat:"nouns", art:"die", pron:"AHN-koonft", ex:"Auf diesem Plan steht die Ankunftszeit.", ex_e:"This schedule shows the arrival time.", hack:"An-KUNFT. 'Kunft' comes from 'kommen' (come). Arrival = the coming-to."},
  {g:"ankreuzen", e:"to cross/tick (a box)", cat:"verbs", pron:"AHN-kroyt-sen", ex:"Auf dem Formular müssen Sie ankreuzen.", ex_e:"On the form you must tick boxes.", hack:"'Kreuz' = cross. An-kreuz-en = put a cross on it. Like an X on a form!"},
  {g:"anmachen", e:"to turn on (light/device)", cat:"verbs", pron:"AHN-mach-en", ex:"Mach bitte das Licht an!", ex_e:"Please turn on the light!", hack:"'Machen' = make/do. 'An-machen' = make it go ON."},
  {g:"(sich) anmelden", e:"to register / sign up", cat:"verbs", pron:"AHN-mel-den", ex:"Wo kann ich mich anmelden?", ex_e:"Where can I register?", hack:"'Melden' = to report. An-melden = report yourself in = register."},
  {g:"die Anmeldung", e:"registration", cat:"nouns", art:"die", pron:"AHN-mel-doong", ex:"Eine Anmeldung ist nicht möglich.", ex_e:"Registration is not possible.", hack:"From 'anmelden'. The '-ung' suffix turns verbs into nouns, like English '-ing'."},
  {g:"die Anrede", e:"salutation / form of address", cat:"nouns", art:"die", pron:"AHN-ray-deh", ex:"Schreiben Sie eine Anrede.", ex_e:"Write a salutation.", hack:"An-REDE = 'speech-to'. The words you address someone with at the start."},
  {g:"anrufen", e:"to call (phone)", cat:"verbs", pron:"AHN-roo-fen", ex:"Kann man Sie anrufen?", ex_e:"Can one call you?", hack:"'Rufen' = to call/shout. An-rufen = call to someone. ANRUFEN = phone call!"},
  {g:"der Anruf", e:"phone call", cat:"nouns", art:"der", pron:"AHN-roof", ex:"Sie bekommt viele Anrufe.", ex_e:"She receives many calls.", hack:"An-RUF = a 'ruf' (call) made to someone."},
  {g:"der Anrufbeantworter", e:"answering machine", cat:"nouns", art:"der", pron:"AHN-roof-be-ant-vor-ter", ex:"Sprechen Sie auf den Anrufbeantworter.", ex_e:"Please speak on the answering machine.", hack:"Anruf (call) + beantworter (answerer). The machine that ANSWERS your CALLS!"},
  {g:"die Ansage", e:"announcement", cat:"nouns", art:"die", pron:"AHN-zah-geh", ex:"Hören Sie die Ansagen.", ex_e:"Listen to the announcements.", hack:"An-SAGE = 'say-to'. Something said/announced to you."},
  {g:"der Anschluss", e:"connection (train/phone)", cat:"nouns", art:"der", pron:"AHN-shloos", ex:"In Mannheim haben Sie Anschluss.", ex_e:"In Mannheim you have a connection.", hack:"An-SCHLUSS = 'close-to'. Two things that close/connect together."},
  {g:"antworten", e:"to answer / reply", cat:"verbs", pron:"AHN-tvort-en", ex:"Er antwortet nicht.", ex_e:"He doesn't answer.", hack:"'Antwort' looks like 'answer' backwards scrambled. Just memorise: ANTWORT = ANSWER."},
  {g:"die Antwort", e:"answer / reply", cat:"nouns", art:"die", pron:"AHN-tvort", ex:"Er gibt keine Antwort.", ex_e:"He gives no answer.", hack:"ANTWORT ≈ ANSWER. Both start with AN-!"},
  {g:"die Anzeige", e:"advertisement / notice", cat:"nouns", art:"die", pron:"AHN-tsy-geh", ex:"Ich habe Ihre Anzeige gelesen.", ex_e:"I read your advertisement.", hack:"An-ZEIGE = 'show-to'. Something shown/displayed to people."},
  {g:"(sich) anziehen", e:"to get dressed / put on", cat:"verbs", pron:"AHN-tsee-en", ex:"Ich muss mich noch anziehen.", ex_e:"I still have to get dressed.", hack:"'Ziehen' = to pull. An-ziehen = pull clothes onto yourself!"},
  {g:"das Apartment", e:"apartment", cat:"nouns", art:"das", pron:"ah-PART-ment", ex:"Wir haben ein Apartment gemietet.", ex_e:"We rented an apartment.", hack:"Same as English 'apartment'! Easy!"},
  {g:"der Apfel", e:"apple", cat:"nouns", art:"der", pron:"APP-fel", ex:"Ein Pfund Äpfel bitte.", ex_e:"One pound of apples please.", hack:"'Apfel' — an APE fell from the APPle tree!"},
  {g:"der Appetit", e:"appetite", cat:"nouns", art:"der", pron:"ah-peh-TEET", ex:"Guten Appetit!", ex_e:"Enjoy your meal!", hack:"'Appetit' = 'appetite'. Identical meaning! Guten Appetit = Bon appétit!"},
  {g:"arbeiten", e:"to work", cat:"verbs", pron:"AR-by-ten", ex:"Wo arbeiten Sie?", ex_e:"Where do you work?", hack:"'Arbeit' — think 'ARBeit' = ARBor (labor). Work = Arbeit."},
  {g:"die Arbeit", e:"work / job", cat:"nouns", art:"die", pron:"AR-bite", ex:"Mein Bruder sucht Arbeit.", ex_e:"My brother is looking for work.", hack:"AR-BITE — your work BITES into your time!"},
  {g:"arbeitslos", e:"unemployed", cat:"adjectives", pron:"AR-bits-lohs", ex:"Er ist schon lange arbeitslos.", ex_e:"He has been unemployed for a long time.", hack:"Arbeit (work) + los (without). WITHOUT WORK = unemployed."},
  {g:"der Arbeitsplatz", e:"workplace", cat:"nouns", art:"der", pron:"AR-bits-plahts", ex:"An meinem Arbeitsplatz fehlt ein Drucker.", ex_e:"My workplace is missing a printer.", hack:"Arbeit (work) + Platz (place). Work-PLACE!"},
  {g:"der Arm", e:"arm", cat:"nouns", art:"der", pron:"AHRM", ex:"Mein Arm tut weh.", ex_e:"My arm hurts.", hack:"'Arm' in German = arm in English. Same word, same meaning!"},
  {g:"der Arzt", e:"doctor (male) / physician", cat:"nouns", art:"der", pron:"ARTST", ex:"Morgen habe ich einen Termin beim Arzt.", ex_e:"Tomorrow I have a doctor's appointment.", hack:"'Arzt' — an ARZTocrat who heals people. Think 'artsy doctor'."},
  {g:"auch", e:"also / too / as well", cat:"other", pron:"OWKH", ex:"Ich bin auch Spanier.", ex_e:"I am also Spanish.", hack:"AUCH ≈ 'ouch' — 'Ouch, I hurt ALSO!'"},
  {g:"auf", e:"on / onto / open", cat:"other", pron:"OWF", ex:"Die Kinder spielen auf der Straße.", ex_e:"The children play on the street.", hack:"AUF sounds like 'off' but means ON. In German, the light is 'auf' when it's ON!"},
  {g:"die Aufgabe", e:"task / exercise / assignment", cat:"nouns", art:"die", pron:"OWF-gah-beh", ex:"Das ist eine schwere Aufgabe.", ex_e:"That is a difficult task.", hack:"Auf-GABE = 'give-up' (as in give in/submit). You give up your task = submit it."},
  {g:"aufhören", e:"to stop / finish / end", cat:"verbs", pron:"OWF-her-en", ex:"Der Kurs hört in einer Woche auf.", ex_e:"The course ends in one week.", hack:"Auf-HÖREN = 'listen-up' reversed. When you say 'stop listening' = stop!"},
  {g:"aufstehen", e:"to get up / stand up", cat:"verbs", pron:"OWF-shtay-en", ex:"Ich muss um vier Uhr aufstehen.", ex_e:"I have to get up at four o'clock.", hack:"Auf (up) + stehen (stand). Stand UP = aufstehen. Like 'upstanding'!"},
  {g:"der Aufzug", e:"elevator / lift", cat:"nouns", art:"der", pron:"OWF-tsoog", ex:"In diesem Haus gibt es keinen Aufzug.", ex_e:"There is no elevator in this building.", hack:"Auf (up) + Zug (pull). Something that PULLS you UP = elevator!"},
  {g:"das Auge", e:"eye", cat:"nouns", art:"das", pron:"OW-geh", ex:"Er hat blaue Augen.", ex_e:"He has blue eyes.", hack:"'Auge' sounds like 'OW-geh' — you poke your EYE and say OW!"},
  {g:"aus", e:"from / out of / off (device)", cat:"other", pron:"OWS", ex:"Er kommt aus Brasilien.", ex_e:"He comes from Brazil.", hack:"AUS = out. He's out FROM somewhere. Light AUS = light out = off."},
  {g:"der Ausflug", e:"excursion / day trip", cat:"nouns", art:"der", pron:"OWS-floog", ex:"Wir machen einen Ausflug nach Heidelberg.", ex_e:"We're going on a day trip to Heidelberg.", hack:"Aus-FLUG = out-flight. You FLY OUT for a trip!"},
  {g:"ausfüllen", e:"to fill in / fill out", cat:"verbs", pron:"OWS-fewl-en", ex:"Füllen Sie bitte dieses Formular aus.", ex_e:"Please fill out this form.", hack:"Aus (out) + füllen (fill). Fill it OUT = complete the form."},
  {g:"der Ausgang", e:"exit", cat:"nouns", art:"der", pron:"OWS-gang", ex:"Wo ist der Ausgang?", ex_e:"Where is the exit?", hack:"Aus-GANG = out-gang/path. The path GOING OUT = exit."},
  {g:"die Auskunft", e:"information / inquiry", cat:"nouns", art:"die", pron:"OWS-koonft", ex:"Können Sie mir eine Auskunft geben?", ex_e:"Can you give me some information?", hack:"Aus-KUNFT = out-knowledge. Knowledge that comes OUT to you = info."},
  {g:"das Ausland", e:"abroad / foreign country", cat:"nouns", art:"das", pron:"OWS-lahnt", ex:"Fahren Sie ins Ausland?", ex_e:"Are you travelling abroad?", hack:"Aus-LAND = out-land. The LAND OUTSIDE your own country!"},
  {g:"der Ausländer", e:"foreigner", cat:"nouns", art:"der", pron:"OWS-len-der", ex:"Sind Sie Ausländerin?", ex_e:"Are you a foreigner?", hack:"From Ausland. A person FROM the out-land."},
  {g:"ausländisch", e:"foreign", cat:"adjectives", pron:"OWS-len-dish", ex:"Ich habe nur ausländisches Geld.", ex_e:"I only have foreign money.", hack:"Ausländisch = foreign. From 'Ausland' + -isch (like -ish in English)."},
  {g:"ausmachen", e:"to turn off (light/device)", cat:"verbs", pron:"OWS-mach-en", ex:"Mach bitte das Licht aus!", ex_e:"Please turn off the light!", hack:"Aus (off) + machen (make). Make it go OFF."},
  {g:"die Aussage", e:"statement", cat:"nouns", art:"die", pron:"OWS-zah-geh", ex:"Ist die Aussage richtig oder falsch?", ex_e:"Is the statement correct or false?", hack:"Aus-SAGE = out-say. What is SAID OUT = a statement."},
  {g:"aussehen", e:"to look / appear", cat:"verbs", pron:"OWS-zay-en", ex:"Das sieht schön aus.", ex_e:"That looks beautiful.", hack:"Aus-SEHEN = out-see. What COMES OUT to be SEEN = appearance."},
  {g:"aussteigen", e:"to get off (bus/train)", cat:"verbs", pron:"OWS-shty-gen", ex:"Wo muss ich aussteigen?", ex_e:"Where do I have to get off?", hack:"Aus (out) + steigen (climb). Climb OUT of the vehicle."},
  {g:"der Ausweis", e:"ID card / identity document", cat:"nouns", art:"der", pron:"OWS-vice", ex:"Hier ist mein Ausweis.", ex_e:"Here is my ID.", hack:"Aus-WEIS = out-show. The card that SHOWS/PROVES who you are."},
  {g:"(sich) ausziehen", e:"to undress / take off (clothes)", cat:"verbs", pron:"OWS-tsee-en", ex:"Zieh die Schuhe aus, bitte!", ex_e:"Take off your shoes, please!", hack:"Aus (off/out) + ziehen (pull). Pull clothes OFF your body."},
  {g:"das Auto", e:"car", cat:"nouns", art:"das", pron:"OW-to", ex:"Er kommt mit dem Auto.", ex_e:"He comes by car.", hack:"'Auto' = car. Same as English 'auto(mobile)'!"},
  {g:"die Autobahn", e:"motorway / highway", cat:"nouns", art:"die", pron:"OW-to-bahn", ex:"Wo geht's hier zur Autobahn?", ex_e:"Where is the motorway from here?", hack:"Auto (car) + Bahn (path/track). The CAR PATH = motorway!"},
  {g:"der Automat", e:"vending machine / automated machine", cat:"nouns", art:"der", pron:"ow-to-MAHT", ex:"Fahrkarten gibt es am Automaten.", ex_e:"Tickets are available at the machine.", hack:"'Automat' = automaton/vending machine. Automatic machine!"},

  // ── B ──
  {g:"das Baby", e:"baby", cat:"nouns", art:"das", pron:"BAY-bee", ex:"Mein Kind ist noch ein Baby.", ex_e:"My child is still a baby.", hack:"Identical to English 'baby'!"},
  {g:"die Bäckerei", e:"bakery", cat:"nouns", art:"die", pron:"beck-er-EYE", ex:"Ich geh schnell zur Bäckerei.", ex_e:"I'll quickly go to the bakery.", hack:"BÄCKER = baker. Bäcker-EI = baker's shop. '-ei' = shop/place."},
  {g:"das Bad", e:"bathroom / bath", cat:"nouns", art:"das", pron:"BAHT", ex:"Wir haben kein großes Bad.", ex_e:"We don't have a large bathroom.", hack:"BAD = bath. A 'bad' bathroom? No — just BATH in German!"},
  {g:"baden", e:"to bathe / have a bath", cat:"verbs", pron:"BAH-den", ex:"Ich bade nicht gern, ich dusche lieber.", ex_e:"I don't like bathing, I prefer showering.", hack:"'Baden' = to bathe. Think of Baden-Baden, the famous spa town!"},
  {g:"die Bahn", e:"train / railway", cat:"nouns", art:"die", pron:"BAHN", ex:"Wir fahren lieber mit der Bahn.", ex_e:"We prefer travelling by train.", hack:"BAHN = path/track. Think of the AUTO-BAHN = car track. Bahn alone = train track."},
  {g:"der Bahnhof", e:"train station", cat:"nouns", art:"der", pron:"BAHN-hof", ex:"Komme ich hier zum Bahnhof?", ex_e:"Does this way lead to the station?", hack:"Bahn (train) + Hof (courtyard/yard). The TRAIN YARD = station!"},
  {g:"der Bahnsteig", e:"platform (train)", cat:"nouns", art:"der", pron:"BAHN-shtyg", ex:"Auf welchem Bahnsteig fährt der Zug?", ex_e:"Which platform does the train depart from?", hack:"Bahn (train) + Steig (ascent/step). Where you STEP UP to the train."},
  {g:"bald", e:"soon", cat:"other", pron:"BAHLT", ex:"Ich komme bald.", ex_e:"I'm coming soon.", hack:"'BALD' in German means SOON, not without hair! Bald = soon = before long."},
  {g:"der Balkon", e:"balcony", cat:"nouns", art:"der", pron:"bal-KOHN", ex:"Die Wohnung hat einen kleinen Balkon.", ex_e:"The apartment has a small balcony.", hack:"Same as English 'balcony'! Easy."},
  {g:"die Banane", e:"banana", cat:"nouns", art:"die", pron:"bah-NAH-neh", ex:"Drei Bananen, bitte!", ex_e:"Three bananas, please!", hack:"'Banane' = banana. Virtually identical!"},
  {g:"die Bank", e:"bank / bench", cat:"nouns", art:"die", pron:"BAHNK", ex:"Die Bank schließt um vier Uhr.", ex_e:"The bank closes at four o'clock.", hack:"'Bank' = bank (money) AND bench! Context tells you which. Sit on a BANK(bench)!"},
  {g:"bar", e:"cash (in cash)", cat:"other", pron:"BAR", ex:"Muss ich bar zahlen?", ex_e:"Do I have to pay cash?", hack:"'Bar' = cash. Think: a bar of gold = pure cash!"},
  {g:"der Bauch", e:"stomach / belly", cat:"nouns", art:"der", pron:"BOWKH", ex:"Mir tut der Bauch weh.", ex_e:"My stomach hurts.", hack:"BAUCH sounds like 'ouch in the belly' — BAUCHache!"},
  {g:"der Baum", e:"tree", cat:"nouns", art:"der", pron:"BOWM", ex:"Fahr nicht an den Baum!", ex_e:"Don't drive into the tree!", hack:"BAUM — a BOOM when the tree falls down!"},
  {g:"der Beamte", e:"official / civil servant", cat:"nouns", art:"der", pron:"be-AHM-teh", ex:"Fragen Sie die Beamtin!", ex_e:"Ask the official!", hack:"BEAMTE — they're always beaming (beamt) with authority!"},
  {g:"bedeuten", e:"to mean / signify", cat:"verbs", pron:"be-DOY-ten", ex:"Was bedeutet das Wort?", ex_e:"What does the word mean?", hack:"Be-DEUT-en. 'Deut' = German/Deutsch. What does it mean in DEUTSCH?"},
  {g:"beginnen", e:"to begin / start", cat:"verbs", pron:"be-GIN-en", ex:"Das Spiel beginnt um 15.30 Uhr.", ex_e:"The game begins at 15:30.", hack:"'Beginnen' ≈ 'begin'. Nearly identical to English!"},
  {g:"bei", e:"near / at / with / by", cat:"other", pron:"BY", ex:"Ich wohne bei meinen Eltern.", ex_e:"I live with my parents.", hack:"BEI sounds like 'by'. 'BY the station' = 'bei dem Bahnhof'."},
  {g:"beide", e:"both", cat:"other", pron:"BY-deh", ex:"Beide Eltern arbeiten.", ex_e:"Both parents work.", hack:"BEIDE = both. 'By-deh' two = both of them by each other."},
  {g:"das Bein", e:"leg", cat:"nouns", art:"das", pron:"BYNE", ex:"Mein rechtes Bein tut weh.", ex_e:"My right leg hurts.", hack:"BEIN sounds like BONE — your leg has a bone in it!"},
  {g:"das Beispiel", e:"example", cat:"nouns", art:"das", pron:"BY-shpeel", ex:"Kannst du mir ein Beispiel sagen?", ex_e:"Can you give me an example?", hack:"Bei-SPIEL = by-game/play. An example is like a PLAY that shows you something."},
  {g:"bekannt", e:"well-known / familiar", cat:"adjectives", pron:"be-KAHNT", ex:"Picasso ist sehr bekannt.", ex_e:"Picasso is very well-known.", hack:"Be-KANNT = be-known. Something KNOWN/familiar."},
  {g:"der/die Bekannte", e:"acquaintance", cat:"nouns", art:"der/die", pron:"be-KAHNT-eh", ex:"Ein Bekannter von mir heißt Klaus.", ex_e:"An acquaintance of mine is called Klaus.", hack:"From 'bekannt'. Someone you KNOW but not a close friend."},
  {g:"bekommen", e:"to receive / get", cat:"verbs", pron:"be-KOM-en", ex:"Haben Sie meinen Brief bekommen?", ex_e:"Did you receive my letter?", hack:"Be-KOMMEN = 'come to you'. Something that COMES to you = received!"},
  {g:"benutzen", e:"to use / make use of", cat:"verbs", pron:"be-NOOT-sen", ex:"Bitte nicht benutzen!", ex_e:"Please do not use!", hack:"Be-NUTZEN. 'Nützen' = to be useful. To USE something = benutzen."},
  {g:"der Beruf", e:"profession / occupation", cat:"nouns", art:"der", pron:"be-ROOF", ex:"Was sind Sie von Beruf?", ex_e:"What is your profession?", hack:"Be-RUF = be-called. What you are CALLED to do = your vocation/profession!"},
  {g:"besetzt", e:"busy / occupied / taken", cat:"adjectives", pron:"be-ZETST", ex:"Die Nummer ist immer besetzt.", ex_e:"The number is always busy.", hack:"Be-SETZT = be-sat. The seat/phone is SAT upon = occupied."},
  {g:"besichtigen", e:"to visit / view (sights)", cat:"verbs", pron:"be-ZIKH-ti-gen", ex:"Ich möchte den Dom besichtigen.", ex_e:"I'd like to visit the cathedral.", hack:"Be-SICHT-igen. 'Sicht' = sight/view. To go SEE the sights = besichtigen."},
  {g:"besser", e:"better", cat:"adjectives", pron:"BES-ser", ex:"Es geht mir schon besser.", ex_e:"I'm already feeling better.", hack:"BESSER ≈ 'better'. BESSEr = BETTER with a German accent!"},
  {g:"best-", e:"best", cat:"adjectives", pron:"BEST", ex:"Am besten treffen wir uns morgen.", ex_e:"Best if we meet tomorrow.", hack:"BEST = best. Same in English! Am besten = 'at the best'."},
  {g:"bestellen", e:"to order", cat:"verbs", pron:"be-SHTEL-en", ex:"Wir möchten bestellen, bitte.", ex_e:"We'd like to order, please.", hack:"Be-STELLEN. 'Stellen' = to place. To PLACE an order = bestellen."},
  {g:"besuchen", e:"to visit", cat:"verbs", pron:"be-ZOO-khen", ex:"Darf ich dich besuchen?", ex_e:"May I visit you?", hack:"Be-SUCHEN = be-seek. Go SEEKING someone out = visiting them."},
  {g:"das Bett", e:"bed", cat:"nouns", art:"das", pron:"BET", ex:"Wir brauchen noch ein Kinderbett.", ex_e:"We still need a child's bed.", hack:"BETT ≈ 'bed'. Almost the same word! Double T but same meaning."},
  {g:"bezahlen", e:"to pay", cat:"verbs", pron:"be-TSAH-len", ex:"Wo muss ich bezahlen?", ex_e:"Where do I have to pay?", hack:"Be-ZAHLEN = 'be-number'. Pay with your numbers (money)!"},
  {g:"das Bier", e:"beer", cat:"nouns", art:"das", pron:"BEER", ex:"Noch ein Bier bitte.", ex_e:"Another beer please.", hack:"BIER = BEER. Same pronunciation essentially!"},
  {g:"das Bild", e:"picture / image", cat:"nouns", art:"das", pron:"BILT", ex:"Hast du ein Bild von deinem Sohn?", ex_e:"Do you have a picture of your son?", hack:"BILD = picture. Think 'BILDBOARD' = billboard = big picture!"},
  {g:"billig", e:"cheap / inexpensive", cat:"adjectives", pron:"BIL-ikh", ex:"Die Jacke kostet nur 10 Euro — billig!", ex_e:"The jacket costs only 10 euros — cheap!", hack:"BILLIG — think of paying a BILLy-goat amount. Cheap!"},
  {g:"die Birne", e:"pear", cat:"nouns", art:"die", pron:"BEER-neh", ex:"Ein Kilo Birnen, bitte!", ex_e:"One kilo of pears, please!", hack:"BIRNE also means 'light bulb' — a pear-SHAPED bulb!"},
  {g:"bis", e:"until / up to", cat:"other", pron:"BISS", ex:"Ich fahre nur bis Stuttgart.", ex_e:"I'm only going as far as Stuttgart.", hack:"BIS = until. Think 'bis-ect' = cut until halfway. BIS = up to that point."},
  {g:"bisschen", e:"a little / a bit", cat:"other", pron:"BIS-khen", ex:"Ein bisschen Deutsch.", ex_e:"A little German.", hack:"BISSCHEN = little bite. A tiny BITE (Biss) of something = a little bit!"},
  {g:"bitte", e:"please / you're welcome", cat:"phrases", pron:"BIT-teh", ex:"Eine Tasse Kaffee, bitte!", ex_e:"A cup of coffee, please!", hack:"BITTE = please. 'BITTE schön' = you're welcome. Always polite!"},
  {g:"die Bitte", e:"request", cat:"nouns", art:"die", pron:"BIT-teh", ex:"Ich habe noch eine Bitte.", ex_e:"I have one more request.", hack:"Same word as 'bitte'! A Bitte = a polite request."},
  {g:"bitten", e:"to ask / request", cat:"verbs", pron:"BIT-en", ex:"Darf ich Sie um etwas bitten?", ex_e:"May I ask you something?", hack:"Bitten = to request/beg. Think 'bitten by the need to ask'!"},
  {g:"bleiben", e:"to stay / remain", cat:"verbs", pron:"BLY-ben", ex:"Ich bleibe heute zu Hause.", ex_e:"I'm staying home today.", hack:"BLEIBEN ≈ 'BLEIBen'. Think BLEEP as in 'bleep me when you stay!'"},
  {g:"der Bleistift", e:"pencil", cat:"nouns", art:"der", pron:"BLY-shtift", ex:"Hast du einen Bleistift?", ex_e:"Do you have a pencil?", hack:"Blei (lead) + Stift (pen/stick). A LEAD STICK = pencil!"},
  {g:"der Blick", e:"view / glance / look", cat:"nouns", art:"der", pron:"BLIK", ex:"Von diesem Hotel hat man einen guten Blick.", ex_e:"From this hotel you have a good view.", hack:"BLICK = glance. Think of a camera's CLICK capturing the BLICK/view!"},
  {g:"die Blume", e:"flower", cat:"nouns", art:"die", pron:"BLOO-meh", ex:"Gefallen dir die Blumen?", ex_e:"Do you like the flowers?", hack:"BLUME ≈ 'bloom'. A blooming flower = Blume!"},
  {g:"böse", e:"angry / wicked / bad", cat:"adjectives", pron:"BER-zeh", ex:"Sie ist böse auf mich.", ex_e:"She is angry with me.", hack:"BÖSE ≈ 'bossy' — a BOSSY, angry person!"},
  {g:"brauchen", e:"to need", cat:"verbs", pron:"BROW-khen", ex:"Brauchst du die Zeitung noch?", ex_e:"Do you still need the newspaper?", hack:"BRAUCHEN — think 'brew-ken'. You NEED to brew your morning coffee!"},
  {g:"breit", e:"wide / broad", cat:"adjectives", pron:"BRYTE", ex:"Wie breit ist der Schrank?", ex_e:"How wide is the wardrobe?", hack:"BREIT = broad/wide. BROAD and BREIT both start with BR!"},
  {g:"der Brief", e:"letter (post)", cat:"nouns", art:"der", pron:"BREEF", ex:"Haben Sie einen Brief für mich?", ex_e:"Do you have a letter for me?", hack:"BRIEF also means 'brief' in English. A letter is BRIEF communication!"},
  {g:"die Briefmarke", e:"stamp (postage)", cat:"nouns", art:"die", pron:"BREEF-mar-keh", ex:"Kaufst du bitte Briefmarken?", ex_e:"Will you buy stamps please?", hack:"Brief (letter) + Marke (mark/brand). The MARK on the LETTER = stamp!"},
  {g:"bringen", e:"to bring", cat:"verbs", pron:"BRING-en", ex:"Bringen Sie mir noch einen Kaffee!", ex_e:"Bring me another coffee!", hack:"BRINGEN = BRING. Almost identical to English!"},
  {g:"das Brot", e:"bread", cat:"nouns", art:"das", pron:"BROHT", ex:"Haben Sie auch Weißbrot?", ex_e:"Do you also have white bread?", hack:"BROT = bread. Think of 'brot-her' sharing his BREAD with you!"},
  {g:"das Brötchen", e:"bread roll", cat:"nouns", art:"das", pron:"BRET-khen", ex:"Möchtest du Brötchen zum Frühstück?", ex_e:"Would you like bread rolls for breakfast?", hack:"BRÖTCHEN = little bread (Brot + -chen = diminutive). Little BROT!"},
  {g:"der Bruder", e:"brother", cat:"nouns", art:"der", pron:"BROO-der", ex:"Sein Bruder arbeitet auch hier.", ex_e:"His brother works here too.", hack:"BRUDER = brother. BROther → BRUder. BR- start, similar vowel!"},
  {g:"das Buch", e:"book", cat:"nouns", art:"das", pron:"BOOKH", ex:"Gute Bücher sind oft sehr teuer.", ex_e:"Good books are often very expensive.", hack:"BUCH = BOOK. Nearly the same! BU-CH = BO-OK."},
  {g:"buchstabieren", e:"to spell (out letters)", cat:"verbs", pron:"bookh-stah-BEE-ren", ex:"Bitte buchstabieren Sie Ihren Namen.", ex_e:"Please spell your name.", hack:"Buchstabe (letter) + ieren. BUCHSTABE = book-staff/symbol. To spell = to say each symbol."},
  {g:"der Bus", e:"bus", cat:"nouns", art:"der", pron:"BOOS", ex:"Wann kommt der nächste Bus?", ex_e:"When does the next bus come?", hack:"BUS = bus. Same word!"},
  {g:"die Butter", e:"butter", cat:"nouns", art:"die", pron:"BOOT-ter", ex:"Ein Brötchen mit Butter und Käse.", ex_e:"A roll with butter and cheese.", hack:"BUTTER = butter. Identical!"},

  // ── C ──
  {g:"das Café", e:"café", cat:"nouns", art:"das", pron:"kah-FAY", ex:"Sollen wir uns im Café treffen?", ex_e:"Shall we meet at the café?", hack:"CAFÉ = café. Identical!"},
  {g:"die CD", e:"CD", cat:"nouns", art:"die", pron:"TSAY-day", ex:"Bring deine Lieblings-CD mit.", ex_e:"Bring your favourite CD.", hack:"CD = CD. Same thing!"},
  {g:"der Chef", e:"boss / manager", cat:"nouns", art:"der", pron:"SHEF", ex:"Wir haben eine neue Chefin.", ex_e:"We have a new boss (female).", hack:"CHEF = boss/chief. Same as English CHEF (chief)!"},
  {g:"circa/ca.", e:"approximately / about", cat:"other", pron:"TSEER-ka", ex:"Circa fünfzig Kilometer.", ex_e:"Approximately fifty kilometres.", hack:"'Circa' = same as English 'circa' or 'ca.' — about/approximately."},
  {g:"der Computer", e:"computer", cat:"nouns", art:"der", pron:"kom-PYOO-ter", ex:"Wann bekommst du deinen neuen Computer?", ex_e:"When are you getting your new computer?", hack:"COMPUTER = computer. Identical!"},

  // ── D ──
  {g:"da", e:"there / here / as (since)", cat:"other", pron:"DAH", ex:"Da hinten ist er ja.", ex_e:"There he is at the back.", hack:"DA = there. 'Da' points to something: DA it is!"},
  {g:"die Dame", e:"lady / madam", cat:"nouns", art:"die", pron:"DAH-meh", ex:"Sehr geehrte Damen und Herren!", ex_e:"Dear Ladies and Gentlemen!", hack:"DAME = dame/lady. Same as English 'dame'!"},
  {g:"danken", e:"to thank", cat:"verbs", pron:"DAHNK-en", ex:"Ich danke Ihnen für die Einladung.", ex_e:"I thank you for the invitation.", hack:"DANKEN — DANKE (thanks) comes from this! Thank-en."},
  {g:"der Dank", e:"thanks / gratitude", cat:"nouns", art:"der", pron:"DAHNK", ex:"Vielen Dank! Herzlichen Dank!", ex_e:"Many thanks! Heartfelt thanks!", hack:"DANK = thanks/gratitude. Think: 'dankfulness' = thankfulness."},
  {g:"danke", e:"thank you", cat:"phrases", pron:"DAHN-keh", ex:"Nein, danke!", ex_e:"No, thank you!", hack:"DANKE = thank you. One of the FIRST German words anyone learns!"},
  {g:"dann", e:"then / afterwards", cat:"other", pron:"DAHN", ex:"Dann komme ich.", ex_e:"Then I'll come.", hack:"DANN = then. 'THEN' in German sounds like 'DAHN'. D-then!"},
  {g:"das Datum", e:"date (calendar)", cat:"nouns", art:"das", pron:"DAH-toom", ex:"Schreiben Sie das Datum auf das Formular.", ex_e:"Write the date on the form.", hack:"DATUM = date. Same as English 'datum'!"},
  {g:"dauern", e:"to last / take (time)", cat:"verbs", pron:"DOW-ern", ex:"Wie lange dauert der Film?", ex_e:"How long does the film last?", hack:"DAUERN — think 'endure'. Something that ENDURES = lasts = dauert."},
  {g:"denn", e:"because / then (particle)", cat:"other", pron:"DEN", ex:"Ich kann nicht kommen, denn ich bin krank.", ex_e:"I can't come because I'm ill.", hack:"DENN = because/for. Think of 'for THEN' — explaining why."},
  {g:"die Disco", e:"disco / nightclub", cat:"nouns", art:"die", pron:"DIS-ko", ex:"Heute Abend gehen wir in die Disco.", ex_e:"Tonight we're going to the disco.", hack:"DISCO = disco. Same!"},
  {g:"der Doktor", e:"doctor (title)", cat:"nouns", art:"der", pron:"DOK-tor", ex:"Wir gehen zum Doktor.", ex_e:"We're going to the doctor.", hack:"DOKTOR = doctor. Same!"},
  {g:"das Doppelzimmer", e:"double room", cat:"nouns", art:"das", pron:"DOP-el-tsim-er", ex:"Wollen Sie ein Doppelzimmer?", ex_e:"Would you like a double room?", hack:"Doppel (double) + Zimmer (room). Double room!"},
  {g:"das Dorf", e:"village", cat:"nouns", art:"das", pron:"DORF", ex:"Meine Familie lebt in einem Dorf.", ex_e:"My family lives in a village.", hack:"DORF ≈ 'thorp' (old English for village). Old English 'thorp/dorp' = village!"},
  {g:"drucken", e:"to print", cat:"verbs", pron:"DROOK-en", ex:"Bitte drucke das Formular für mich.", ex_e:"Please print the form for me.", hack:"DRUCKEN = to print. DRUCK = pressure/print. Printing presses PRESS (drücken)!"},
  {g:"der Drucker", e:"printer", cat:"nouns", art:"der", pron:"DROOK-er", ex:"Mein Drucker ist kaputt.", ex_e:"My printer is broken.", hack:"DRUCKER = printer. From drucken (to print)."},
  {g:"drücken", e:"to press / push", cat:"verbs", pron:"DREW-ken", ex:"Drück hier, dann geht der Computer an.", ex_e:"Press here, then the computer turns on.", hack:"DRÜCKEN = press/push. DRUCK = pressure. Apply PRESSURE = press."},
  {g:"durch", e:"through / by means of", cat:"other", pron:"DOORKH", ex:"Gehen Sie durch die Breite Straße.", ex_e:"Go through the Breite Strasse.", hack:"DURCH = through. Think 'D-ARCH' = through an arch!"},
  {g:"die Durchsage", e:"announcement (PA system)", cat:"nouns", art:"die", pron:"DOORKH-zah-geh", ex:"Ich habe die Durchsage nicht verstanden.", ex_e:"I didn't understand the announcement.", hack:"Durch (through) + Sage (say). Something SAID THROUGH the speakers."},
  {g:"dürfen", e:"to be allowed to / may", cat:"verbs", pron:"DEW-fen", ex:"Sie dürfen hier nicht rauchen.", ex_e:"You are not allowed to smoke here.", hack:"DÜRFEN = may/allowed. 'Darf ich?' = 'May I?' Learn this for permissions!"},
  {g:"der Durst", e:"thirst", cat:"nouns", art:"der", pron:"DOORST", ex:"Ich habe großen Durst.", ex_e:"I am very thirsty.", hack:"DURST = thirst. Think 'the WORST kind of THIRST'!"},
  {g:"(sich) duschen", e:"to shower", cat:"verbs", pron:"DOOSH-en", ex:"Ich dusche lieber.", ex_e:"I prefer to shower.", hack:"DUSCHEN = to shower. Think 'DOUCHE' (French origin) — shower!"},
  {g:"die Dusche", e:"shower", cat:"nouns", art:"die", pron:"DOOSH-eh", ex:"Unsere Wohnung hat nur eine Dusche.", ex_e:"Our apartment only has a shower.", hack:"DUSCHE = shower. Same French/German root as 'douche'."},

  // ── E ──
  {g:"die Ecke", e:"corner", cat:"nouns", art:"die", pron:"EK-eh", ex:"An der nächsten Ecke links.", ex_e:"At the next corner, turn left.", hack:"ECKE = corner. 'ECK-e' — like a sharp edgy ANGLE at the corner."},
  {g:"die Ehefrau", e:"wife", cat:"nouns", art:"die", pron:"AY-eh-frow", ex:"Das ist meine Ehefrau.", ex_e:"This is my wife.", hack:"Ehe (marriage) + Frau (woman). The MARRIED WOMAN = wife!"},
  {g:"der Ehemann", e:"husband", cat:"nouns", art:"der", pron:"AY-eh-mahn", ex:"Das ist mein Ehemann.", ex_e:"This is my husband.", hack:"Ehe (marriage) + Mann (man). The MARRIED MAN = husband!"},
  {g:"das Ei", e:"egg", cat:"nouns", art:"das", pron:"EYE", ex:"Möchtest du ein Ei zum Frühstück?", ex_e:"Would you like an egg for breakfast?", hack:"EI = egg. Shaped like an I, and sounds like 'eye'!"},
  {g:"eilig", e:"urgent / in a hurry", cat:"adjectives", pron:"EYE-likh", ex:"Hast du es eilig?", ex_e:"Are you in a hurry?", hack:"EILIG — think 'I-lick-it quickly' because you're in a hurry!"},
  {g:"einfach", e:"simple / one-way (ticket)", cat:"adjectives", pron:"EYN-fakh", ex:"Die Prüfung ist ganz einfach.", ex_e:"The exam is quite simple.", hack:"Ein (one) + fach (fold/way). ONE WAY = simple! Einfach = simple."},
  {g:"der Eingang", e:"entrance", cat:"nouns", art:"der", pron:"EYN-gang", ex:"Der Eingang ist um die Ecke.", ex_e:"The entrance is around the corner.", hack:"Ein (in) + Gang (path/corridor). The IN-path = entrance!"},
  {g:"einkaufen", e:"to go shopping", cat:"verbs", pron:"EYN-kow-fen", ex:"Ich muss noch einkaufen.", ex_e:"I still have to go shopping.", hack:"Ein (in) + kaufen (buy). Go IN and BUY = go shopping!"},
  {g:"einladen", e:"to invite", cat:"verbs", pron:"EYN-lah-den", ex:"Darf ich Sie zu einem Kaffee einladen?", ex_e:"May I invite you for a coffee?", hack:"Ein (in) + laden (to load/invite). LOAD someone IN = invite them in!"},

  {g:"einmal", e:"once / one time", cat:"other", pron:"EYN-mahl", ex:"Diese Prüfung mache ich nicht noch einmal.", ex_e:"I won't take this exam again.", hack:"Ein (one) + mal (time). ONE TIME = once = einmal."},

  {g:"der Eintritt", e:"admission / entry", cat:"nouns", art:"der", pron:"EYN-trit", ex:"Der Preis für den Eintritt ist 5 Euro.", ex_e:"The admission price is 5 euros.", hack:"Ein (in) + Tritt (step). The IN-STEP = entry/admission."},

  {g:"das Ende", e:"end / finish", cat:"nouns", art:"das", pron:"EN-deh", ex:"Sie wohnt am Ende der Straße.", ex_e:"She lives at the end of the street.", hack:"ENDE = end. Same as English 'end'!"},

  {g:"die Entschuldigung", e:"excuse me / apology", cat:"phrases", pron:"ent-SHOOL-di-goong", ex:"Entschuldigung! – Bitte.", ex_e:"Excuse me! – No problem.", hack:"From entschuldigen. The key phrase for 'sorry/excuse me' in German!"},

  {g:"das Essen", e:"food / meal", cat:"nouns", art:"das", pron:"ES-en", ex:"Das Essen ist heute sehr gut.", ex_e:"The food is very good today.", hack:"Same as the verb ESSEN. Essen = eating = food/meal."},

  {g:"feiern", e:"to celebrate / party", cat:"verbs", pron:"FY-ern", ex:"Wir feiern heute meinen Geburtstag.", ex_e:"We're celebrating my birthday today.", hack:"FEIERN = celebrate. FEIER-abend (end of work) = time to celebrate/relax!"},
  {g:"fehlen", e:"to be missing / absent / wrong", cat:"verbs", pron:"FAY-len", ex:"Was fehlt Ihnen?", ex_e:"What is wrong/missing?", hack:"FEHLEN = to be missing. FEHLER = error/mistake. When something FAILS = fehlt."},
  {g:"der Fehler", e:"mistake / error", cat:"nouns", art:"der", pron:"FAY-ler", ex:"Diesen Fehler mache ich immer.", ex_e:"I always make this mistake.", hack:"FEHLER = error. FAIL-er → FEHLER. When you FAIL = you make a Fehler!"},

  {g:"fertig", e:"ready / finished / done", cat:"adjectives", pron:"FER-tikh", ex:"Bist du fertig?", ex_e:"Are you ready?", hack:"FERTIG = finished/ready. Think 'FERTILE ground is READY to grow'."},
  {g:"das Feuer", e:"fire", cat:"nouns", art:"das", pron:"FOY-er", ex:"Haben Sie Feuer?", ex_e:"Do you have a light? (fire/lighter)", hack:"FEUER = fire. FEU = fire in French. Think 'fever = fire in the body'!"},
  {g:"das Fieber", e:"fever / temperature", cat:"nouns", art:"das", pron:"FEE-ber", ex:"Mein Mann hat noch immer Fieber.", ex_e:"My husband still has a fever.", hack:"FIEBER = fever. Sounds like FEVER with a German twist!"},

  {g:"finden", e:"to find / think (opinion)", cat:"verbs", pron:"FIN-den", ex:"Wir müssen den Schlüssel finden.", ex_e:"We must find the key.", hack:"FINDEN = find. FIN-den → FIND-en. Nearly identical!"},
  {g:"die Firma", e:"company / firm", cat:"nouns", art:"die", pron:"FEER-mah", ex:"Er arbeitet bei einer anderen Firma.", ex_e:"He works at a different company.", hack:"FIRMA = firm/company. Same as English 'firm'!"},
  {g:"der Fisch", e:"fish", cat:"nouns", art:"der", pron:"FISH", ex:"Ich esse gern Fisch.", ex_e:"I like eating fish.", hack:"FISCH = fish. Almost identical!"},

  {g:"das Fleisch", e:"meat / flesh", cat:"nouns", art:"das", pron:"FLYSH", ex:"Fleisch mag ich nicht.", ex_e:"I don't like meat.", hack:"FLEISCH = flesh/meat. FLESH → FLEISCH. Same root!"},
  {g:"fliegen", e:"to fly", cat:"verbs", pron:"FLEE-gen", ex:"Ich fliege nicht gern.", ex_e:"I don't like flying.", hack:"FLIEGEN = fly. FLIT/FLEE/FLY — all the same FL- flight family!"},
  {g:"der Flughafen", e:"airport", cat:"nouns", art:"der", pron:"FLOOG-hah-fen", ex:"Kannst du mich zum Flughafen bringen?", ex_e:"Can you take me to the airport?", hack:"Flug (flight) + Hafen (harbour). The FLIGHT HARBOUR = airport!"},
  {g:"das Flugzeug", e:"airplane", cat:"nouns", art:"das", pron:"FLOOG-tsoig", ex:"Das Flugzeug aus Berlin kommt später an.", ex_e:"The plane from Berlin arrives later.", hack:"Flug (flight) + Zeug (stuff/device). The FLYING DEVICE = airplane!"},
  {g:"das Formular", e:"form (document)", cat:"nouns", art:"das", pron:"for-moo-LAR", ex:"Sie müssen dieses Formular ausfüllen.", ex_e:"You must fill out this form.", hack:"FORMULAR = form. Same root as English 'formula/form'!"},

  {g:"die Frage", e:"question", cat:"nouns", art:"die", pron:"FRAH-geh", ex:"Ich habe eine Frage.", ex_e:"I have a question.", hack:"FRAGE = question. From fragen. A QUESTION = Frage."},

  {g:"die Führung", e:"guided tour", cat:"nouns", art:"die", pron:"FEW-roong", ex:"Die Führung beginnt in 3 Minuten.", ex_e:"The guided tour begins in 3 minutes.", hack:"FÜHRUNG from 'führen' (to lead). The act of LEADING people around = tour."},

  {g:"der Garten", e:"garden", cat:"nouns", art:"der", pron:"GAR-ten", ex:"Wir haben leider keinen Garten.", ex_e:"Unfortunately we don't have a garden.", hack:"GARTEN = garden. GARTEN → GARDEN. Same root!"},
  {g:"der Gast", e:"guest", cat:"nouns", art:"der", pron:"GAHST", ex:"Am Wochenende haben wir mehrere Gäste.", ex_e:"At the weekend we have several guests.", hack:"GAST = guest. Same root as English 'guest' and 'host'!"},
  {g:"geben", e:"to give", cat:"verbs", pron:"GAY-ben", ex:"Kannst du mir deinen Kugelschreiber geben?", ex_e:"Can you give me your pen?", hack:"GEBEN = give. G-G: GIVE → GEBEN."},
  {g:"geboren", e:"born", cat:"adjectives", pron:"ge-BOR-en", ex:"Ich bin in Zagreb geboren.", ex_e:"I was born in Zagreb.", hack:"GEBOREN = born. Think 'GE-BORN-en'. Born in German!"},

  {g:"der Geburtstag", e:"birthday", cat:"nouns", art:"der", pron:"ge-BURTS-tahg", ex:"Herzlichen Glückwunsch zum Geburtstag!", ex_e:"Happy birthday!", hack:"Geburt (birth) + Tag (day). BIRTH DAY = birthday!"},

  {g:"gehen", e:"to go / walk / work", cat:"verbs", pron:"GAY-en", ex:"Jetzt muss ich gehen.", ex_e:"Now I have to go.", hack:"GEHEN = go. GAY-en → GO. The G in GO = G in GEHEN!"},
  {g:"gehören", e:"to belong to", cat:"verbs", pron:"ge-HER-en", ex:"Wem gehört das?", ex_e:"Who does this belong to?", hack:"Ge-HÖREN. 'Hören' = hear. When something BELONGS to you, it 'listens' to you."},
  {g:"das Geld", e:"money", cat:"nouns", art:"das", pron:"GELT", ex:"Hast du noch Geld?", ex_e:"Do you still have money?", hack:"GELD = money. GOLD → GELD. Money used to be GOLD!"},
  {g:"das Gemüse", e:"vegetables", cat:"nouns", art:"das", pron:"ge-MEW-zeh", ex:"Gemüse brauchen wir auch noch.", ex_e:"We still need vegetables.", hack:"GEMÜSE — the MÜ in the middle sounds like 'mew' (a cat sound). Garden cat eats veggies!"},

  {g:"das Gewicht", e:"weight", cat:"nouns", art:"das", pron:"ge-VIKHT", ex:"Sein Gewicht ist normal.", ex_e:"His weight is normal.", hack:"GEWICHT = weight. WEIGHt → GEWICHT. Same root!"},
  {g:"gewinnen", e:"to win", cat:"verbs", pron:"ge-VIN-en", ex:"Wer gewinnt das Spiel?", ex_e:"Who wins the game?", hack:"GEWINNEN = win. GAIN → GEWINNEN. To GAIN/WIN!"},
  {g:"das Glas", e:"glass", cat:"nouns", art:"das", pron:"GLAHS", ex:"Bitte noch ein Glas Wein!", ex_e:"One more glass of wine please!", hack:"GLAS = glass. Same word!"},
  {g:"glauben", e:"to believe / think", cat:"verbs", pron:"GLOW-ben", ex:"Ich glaube, er kommt gleich.", ex_e:"I think he's coming soon.", hack:"GLAUBEN = believe. GLOW with belief? GLAUBen = believe!"},

  {g:"das Glück", e:"luck / happiness", cat:"nouns", art:"das", pron:"GLEWK", ex:"Viel Glück!", ex_e:"Good luck!", hack:"GLÜCK = luck. 'GLUCK-gluck' like a lucky coin dropping!"},
  {g:"glücklich", e:"happy / lucky", cat:"adjectives", pron:"GLEWK-likh", ex:"Meine Kinder sind glücklich.", ex_e:"My children are happy.", hack:"GLÜCKLICH = happy. From GLÜCK (luck/happiness)."},
  {g:"der Glückwunsch", e:"congratulations", cat:"nouns", art:"der", pron:"GLEWK-voonsh", ex:"Herzlichen Glückwunsch zum Geburtstag.", ex_e:"Heartfelt congratulations on your birthday.", hack:"Glück (luck) + Wunsch (wish). A LUCKY WISH = congratulations!"},
  {g:"gratulieren", e:"to congratulate", cat:"verbs", pron:"gra-too-LEER-en", ex:"Ich gratuliere dir!", ex_e:"I congratulate you!", hack:"GRATULIEREN = congratulate. Same as English/French 'congratulate'!"},

  {g:"die Großeltern", e:"grandparents", cat:"nouns", art:"die", pron:"GROHS-el-tern", ex:"Meine Großeltern leben in Japan.", ex_e:"My grandparents live in Japan.", hack:"Groß (great/grand) + Eltern (parents). GRAND PARENTS!"},
  {g:"die Großmutter", e:"grandmother", cat:"nouns", art:"die", pron:"GROHS-moot-er", ex:"Meine Großmutter heißt Eva.", ex_e:"My grandmother is called Eva.", hack:"Groß + Mutter (mother). GRAND MOTHER!"},

  {g:"verkaufen", e:"to sell", cat:"verbs", pron:"fer-KOW-fen", ex:"Er verkauft sein altes Auto.", ex_e:"He is selling his old car.", hack:"VER-kaufen. Kaufen = buy. VER- reverses it = SELL!"},
  {g:"der Verkäufer", e:"salesperson / shop assistant", cat:"nouns", art:"der", pron:"fer-KOY-fer", ex:"Meine Mutter ist Verkäuferin.", ex_e:"My mother is a sales assistant.", hack:"VERKÄUFER from verkaufen (sell). The one who SELLS!"},

  {g:"das Wort", e:"word", cat:"nouns", art:"das", pron:"VORT", ex:"Ich kenne das Wort nicht.", ex_e:"I don't know the word.", hack:"WORT = word. WORD → WORT. Same!"},
  {g:"wunderbar", e:"wonderful / marvellous", cat:"adjectives", pron:"VOON-der-bar", ex:"Das Essen schmeckt wunderbar.", ex_e:"The food tastes wonderful.", hack:"WUNDERBAR = wonderful. WUNDER = wonder. Wonder-BAR = wonderful!"},

  // ── Z ──
  {g:"zahlen", e:"to pay", cat:"verbs", pron:"TSAH-len", ex:"Zahlen, bitte!", ex_e:"The bill please!", hack:"ZAHLEN = pay. Think 'TOLL — count the numbers (Zahlen) to pay'!"},
  {g:"die Zeit", e:"time", cat:"nouns", art:"die", pron:"TSYTE", ex:"Ich habe heute keine Zeit.", ex_e:"I don't have time today.", hack:"ZEIT = time. Think 'ZEITGEIST = spirit of the TIME'!"},
  {g:"die Zeitung", e:"newspaper", cat:"nouns", art:"die", pron:"TSYE-toong", ex:"Ich lese gern Zeitung.", ex_e:"I like reading the newspaper.", hack:"ZEITUNG = newspaper. ZEIT (time) = the newspaper of the TIMES!"},
  {g:"die Zigarette", e:"cigarette", cat:"nouns", art:"die", pron:"tsig-ah-RET-eh", ex:"Wie teuer sind die Zigaretten?", ex_e:"How expensive are the cigarettes?", hack:"ZIGARETTE = cigarette. Same!"},
  {g:"das Zimmer", e:"room", cat:"nouns", art:"das", pron:"TSIM-er", ex:"Das Zimmer ist groß.", ex_e:"The room is large.", hack:"ZIMMER = room. Think 'TIMBER room with wooden walls'!"},
  {g:"der Zoll", e:"customs (border)", cat:"nouns", art:"der", pron:"TSOL", ex:"Wir müssen noch durch den Zoll.", ex_e:"We still have to go through customs.", hack:"ZOLL = customs/toll. TOLL → ZOLL. The TOLL you pay at the border!"},
  {g:"zu", e:"to / too / closed", cat:"other", pron:"TSOO", ex:"Ich gehe zu Fuß.", ex_e:"I go on foot.", hack:"ZU = to/too/closed. Too many meanings! ZU viel = TOO much!"},
  {g:"zufrieden", e:"satisfied / content", cat:"adjectives", pron:"tsoo-FREE-den", ex:"Ich bin mit der Wohnung zufrieden.", ex_e:"I'm satisfied with the apartment.", hack:"Zu (to) + Frieden (peace). At PEACE with something = satisfied!"},
  {g:"der Zug", e:"train / pull", cat:"nouns", art:"der", pron:"TSOOG", ex:"Ich fahre gern mit dem Zug.", ex_e:"I like travelling by train.", hack:"ZUG = train. Think 'ZUG ZUGZWANG' — you're pulled along on the rails!"},
  {g:"zurück", e:"back / return", cat:"other", pron:"tsoo-REWK", ex:"Einmal Frankfurt und zurück.", ex_e:"One return to Frankfurt.", hack:"ZURÜCK = back/return. Zu (to) + rück (back). Go BACK to = zurück!"},
  {g:"zusammen", e:"together", cat:"other", pron:"tsoo-ZAHM-en", ex:"Sollen wir zusammen essen gehen?", ex_e:"Shall we go eat together?", hack:"ZUSAMMEN = together. Zu + sammen (same). At the SAME PLACE = together!"},
  {g:"zwischen", e:"between", cat:"other", pron:"TSVIH-shen", ex:"Heidelberg liegt zwischen Frankfurt und Stuttgart.", ex_e:"Heidelberg is situated between Frankfurt and Stuttgart.", hack:"ZWISCHEN = between. Think 'SWISH-en between two things'!"},

  // ── PHRASES & GREETINGS ──
  {g:"Guten Morgen", e:"Good morning", cat:"phrases", pron:"GOO-ten MOR-gen", ex:"Guten Morgen!", ex_e:"Good morning!", hack:"Gut (good) + Morgen (morning). GOOD MORNING!"},
  {g:"Guten Tag", e:"Good day / Hello", cat:"phrases", pron:"GOO-ten TAHG", ex:"Guten Tag, Frau Schmitt!", ex_e:"Good day, Mrs Schmitt!", hack:"Gut (good) + Tag (day). GOOD DAY!"},

  {g:"Wie geht's?", e:"How are you? (informal)", cat:"phrases", pron:"vee GAYTS", ex:"Hallo, wie geht's?", ex_e:"Hi, how are you?", hack:"Short form of 'Wie geht es dir?' = How's it going? Very common!"},

  {g:"Guten Appetit", e:"Enjoy your meal", cat:"phrases", pron:"GOO-ten ah-peh-TEET", ex:"Guten Appetit!", ex_e:"Enjoy your meal!", hack:"Gut (good) + Appetit. Like French 'Bon appétit'!"},
  {g:"Herzlichen Glückwunsch", e:"Congratulations / Happy birthday", cat:"phrases", pron:"HERTS-likh-en GLEWK-voonsh", ex:"Herzlichen Glückwunsch!", ex_e:"Congratulations!", hack:"Herzlich (heartfelt) + Glückwunsch (lucky wish). Heartfelt lucky wishes!"},
  {g:"Entschuldigung", e:"Excuse me / Sorry", cat:"phrases", pron:"ent-SHOOL-di-goong", ex:"Entschuldigung!", ex_e:"Excuse me!", hack:"From entschuldigen (to excuse). Remove the guilt = Entschuldigung!"},
  {g:"Bitte schön", e:"Here you are / You're welcome", cat:"phrases", pron:"BIT-eh SHERN", ex:"Danke! – Bitte schön.", ex_e:"Thanks! – You're welcome.", hack:"Bitte (please) + schön (nice/beautiful). Nicely please = you're welcome!"},
  {g:"Vielen Dank", e:"Many thanks", cat:"phrases", pron:"FEE-len DAHNK", ex:"Vielen Dank!", ex_e:"Many thanks!", hack:"Viel (many/much) + Dank (thanks). MANY THANKS!"},
  {g:"Alles Gute", e:"All the best", cat:"phrases", pron:"AH-les GOO-teh", ex:"Alles Gute!", ex_e:"All the best!", hack:"Alles (everything) + Gute (good). All GOOD things to you!"},
  {g:"Kein Problem", e:"No problem", cat:"phrases", pron:"KINE pro-BLAYM", ex:"Kein Problem!", ex_e:"No problem!", hack:"Kein (no/none) + Problem. NO PROBLEM!"},
  {g:"Viel Spaß", e:"Have fun", cat:"phrases", pron:"FEEL SHPAHS", ex:"Viel Spaß!", ex_e:"Have fun!", hack:"Viel (much) + Spaß (fun). Lots of FUN!"},
];

// Assign articles
VOCAB.forEach(v => {
  if (!v.art) v.art = "";
});

// State
let statuses = {};
try {
  const saved = localStorage.getItem('a1_vocab_status');
  if (saved) statuses = JSON.parse(saved);
} catch(e) {}

function saveStatuses() {
  try { localStorage.setItem('a1_vocab_status', JSON.stringify(statuses)); } catch(e) {}
}

function getCategoryColor(cat) {
  const colors = {
    nouns: "#3b82f6",
    verbs: "#22c55e",
    adjectives: "#f59e0b",
    phrases: "#ec4899",
    other: "#8b5cf6"
  };
  return colors[cat] || "#6b7280";
}

function renderVocab() {
  const search = document.getElementById('search').value.toLowerCase();
  const catFilter = document.getElementById('filter-cat').value;
  const statusFilter = document.getElementById('filter-status').value;

  const container = document.getElementById('vocab-container');
  container.innerHTML = '';

  const filtered = VOCAB.filter(v => {
    const matchSearch = !search ||
      v.g.toLowerCase().includes(search) ||
      v.e.toLowerCase().includes(search) ||
      (v.hack || '').toLowerCase().includes(search);
    const matchCat = catFilter === 'all' || v.cat === catFilter;
    const st = statuses[v.g] || 'unstarted';
    const matchStatus = statusFilter === 'all' || st === statusFilter;
    return matchSearch && matchCat && matchStatus;
  });

  // Group by letter
  const grouped = {};
  filtered.forEach(v => {
    const letter = v.g.replace(/^(das |der |die )/, '').charAt(0).toUpperCase();
    if (!grouped[letter]) grouped[letter] = [];
    grouped[letter].push(v);
  });

  Object.keys(grouped).sort().forEach(letter => {
    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = `<span>${letter}</span><span style="color:var(--muted);font-weight:400">${grouped[letter].length} words</span>`;
    container.appendChild(hdr);

    const grid = document.createElement('div');
    grid.className = 'grid';
    grouped[letter].forEach(v => {
      grid.appendChild(createCard(v));
    });
    container.appendChild(grid);
  });

  document.getElementById('count-display').textContent = `Showing ${filtered.length} of ${VOCAB.length} words`;
  updateStats();
}

function createCard(v) {
  const st = statuses[v.g] || 'unstarted';
  const div = document.createElement('div');
  div.className = `card ${st === 'learned' ? 'learned' : st === 'learning' ? 'learning' : ''}`;

  const color = getCategoryColor(v.cat);

  div.innerHTML = `
    <div class="card-top">
      <div>
        ${v.art ? `<div class="article">${v.art}</div>` : ''}
        <div class="german">${v.g}</div>
      </div>
      <span class="category-badge" style="background:${color}22;color:${color}">${v.cat}</span>
    </div>
    <div class="english">🇬🇧 ${v.e}</div>
    <div class="pronunciation">🔊 ${v.pron}</div>
    <div class="example">${v.ex}<span>→ ${v.ex_e}</span></div>
    ${v.hack ? `<div class="memory-hack">${v.hack}</div>` : ''}
    <div class="card-footer">
      <button class="mark-btn mark-review" onclick="setStatus('${v.g}', 'learning', event)" style="${st==='learning'?'background:#92400e;outline:2px solid #fbbf24':''}">
        ${st === 'learning' ? '⭐ Reviewing' : '🔖 Mark Reviewing'}
      </button>
      <button class="mark-btn mark-learned" onclick="setStatus('${v.g}', st==='learned'?'unstarted':'learned', event)" style="${st==='learned'?'background:#14532d;outline:2px solid #4ade80':''}">
        ${st === 'learned' ? '✓ Learned!' : '✓ Mark Learned'}
      </button>
    </div>
  `;
  // Fix the toggle logic
  const learnBtn = div.querySelector('.mark-learned');
  learnBtn.onclick = (e) => {
    const cur = statuses[v.g] || 'unstarted';
    setStatus(v.g, cur === 'learned' ? 'unstarted' : 'learned', e);
  };
  const reviewBtn = div.querySelector('.mark-review');
  reviewBtn.onclick = (e) => {
    const cur = statuses[v.g] || 'unstarted';
    setStatus(v.g, cur === 'learning' ? 'unstarted' : 'learning', e);
  };
  return div;
}

function setStatus(word, status, e) {
  if (e) e.stopPropagation();
  statuses[word] = status;
  saveStatuses();
  renderVocab();
}

function updateStats() {
  const learned = Object.values(statuses).filter(s => s === 'learned').length;
  const reviewing = Object.values(statuses).filter(s => s === 'learning').length;
  document.getElementById('total-count').textContent = VOCAB.length;
  document.getElementById('learned-count').textContent = learned;
  document.getElementById('review-count').textContent = reviewing;
  document.getElementById('progress-pct').textContent = Math.round(learned / VOCAB.length * 100) + '%';
}

function resetAll() {
  if (confirm('Reset all progress?')) {
    statuses = {};
    saveStatuses();
    renderVocab();
  }
}

// Quiz
let quizWords = [], quizIndex = 0, quizScore = 0;

function startQuiz() {
  // Use all words or reviewing/unlearned
  quizWords = [...VOCAB].sort(() => Math.random() - 0.5).slice(0, 10);
  quizIndex = 0;
  quizScore = 0;
  document.getElementById('quiz-panel').classList.add('active');
  showQuizQuestion();
}

function closeQuiz() {
  document.getElementById('quiz-panel').classList.remove('active');
}

function showQuizQuestion() {
  if (quizIndex >= quizWords.length) {
    document.getElementById('quiz-q').textContent = `Quiz complete! 🎉`;
    document.getElementById('quiz-hint').textContent = `You scored ${quizScore} / ${quizWords.length}`;
    document.getElementById('quiz-opts').innerHTML = `<button class="btn btn-gold" onclick="startQuiz()" style="grid-column:span 2">Play Again</button>`;
    document.getElementById('quiz-progress').style.width = '100%';
    document.getElementById('quiz-score').textContent = `Final score: ${quizScore}/${quizWords.length}`;
    return;
  }

  const w = quizWords[quizIndex];
  document.getElementById('quiz-score').textContent = `Question ${quizIndex + 1} / ${quizWords.length} · Score: ${quizScore}`;
  document.getElementById('quiz-progress').style.width = `${(quizIndex / quizWords.length) * 100}%`;
  document.getElementById('quiz-q').textContent = w.g;
  document.getElementById('quiz-hint').textContent = `What does this mean in English?`;

  // 3 wrong answers
  let wrong = VOCAB.filter(x => x.g !== w.g).sort(() => Math.random() - 0.5).slice(0, 3);
  let opts = [w, ...wrong].sort(() => Math.random() - 0.5);

  const optsDiv = document.getElementById('quiz-opts');
  optsDiv.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = opt.e;
    btn.onclick = () => answerQuiz(btn, opt.g === w.g, optsDiv);
    optsDiv.appendChild(btn);
  });
}

function answerQuiz(btn, correct, optsDiv) {
  Array.from(optsDiv.children).forEach(b => b.onclick = null);
  if (correct) {
    btn.classList.add('correct');
    quizScore++;
  } else {
    btn.classList.add('wrong');
    // Show correct
    Array.from(optsDiv.children).forEach(b => {
      if (b !== btn && b.textContent === quizWords[quizIndex].e) b.classList.add('correct');
    });
  }
  quizIndex++;
  setTimeout(showQuizQuestion, 1200);
}

// Event listeners
document.getElementById('search').addEventListener('input', renderVocab);
document.getElementById('filter-cat').addEventListener('change', renderVocab);
document.getElementById('filter-status').addEventListener('change', renderVocab);

// Init
renderVocab();
</script>
